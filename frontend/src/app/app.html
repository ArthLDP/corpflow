<mat-drawer-container class="app-container">
  <mat-drawer #drawer class="app-sidenav" mode="side" opened>
    <div class="sidenav-header">
      <h2>Corpflow</h2>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/">
        <mat-icon matListItemIcon>home</mat-icon>
        <span matListItemTitle>Home</span>
      </a>
      <a mat-list-item routerLink="/signup">
        <mat-icon matListItemIcon>person_add</mat-icon>
        <span matListItemTitle>Sign Up</span>
      </a>
      @if (isUserAuthenticated()) {
          <a mat-list-item routerLink="/kanban">
            <mat-icon matListItemIcon>dashboard</mat-icon>
            <span matListItemTitle>Kanban</span>
          </a>

          <button mat-button color="primary" (click)="logout()">
            <mat-icon>logout</mat-icon>
            Logout
          </button>
      }
      @else {
          <a mat-list-item routerLink="/login">
            <mat-icon matListItemIcon>login</mat-icon>
            <span matListItemTitle>Login</span>
          </a>
      }
    </mat-nav-list>
  </mat-drawer>

  <div class="app-content">
    <router-outlet></router-outlet>
  </div>
</mat-drawer-container>
