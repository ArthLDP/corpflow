<div class="home-container">
  @if(isUserAuthenticated()) {
    <mat-card class="card">
      <mat-card-header>
        <mat-card-title>You are logged in</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="action-buttons">
          <button mat-raised-button color="accent" routerLink="/kanban">
            Get Started - Access Kanban page
          </button>
        </div>
      </mat-card-content>
    </mat-card>
  }
  @else {
    <mat-card class="card">
      <mat-card-header>
        <mat-card-title>Welcome to Corpflow</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p class="welcome-text">
          A Kanban system to manage tasks. Create an account to access the Kanban page.
        </p>
        <div class="action-buttons">
          <button mat-raised-button color="accent" routerLink="/signup">
            Get Started - Sign Up
          </button>
          <button mat-raised-button color="accent" routerLink="/login">
            Already have an account? Login
          </button>
        </div>
      </mat-card-content>
    </mat-card>
  }
</div>
